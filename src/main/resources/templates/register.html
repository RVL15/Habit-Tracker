<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Habit Tracker</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --primary-light: rgba(16, 185, 129, 0.15);
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --border: #334155;
            }
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }
        .register-card {
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            background: var(--card-bg);
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
        }
        .register-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .btn-green {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            font-weight: 600;
            border-radius: 10px;
            padding: 0.7rem;
            transition: all 0.2s ease;
        }
        .btn-green:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        .form-control {
            background-color: var(--card-bg);
            color: var(--text-main);
            border-radius: 10px;
            padding: 0.7rem 0.9rem;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }
        .form-control::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }
        .form-control:focus {
            background-color: var(--card-bg);
            color: var(--text-main);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }
        .text-green {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .text-green:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
        .text-muted {
            color: var(--text-muted) !important;
        }
        .text-danger {
            color: #ef4444 !important;
        }
    </style>
</head>
<body>

<div class="register-card my-4">
    <div class="text-center mb-4">
        <h2 class="fw-bold mb-1">Create Account</h2>
        <p class="text-muted small">Start building healthier routines today</p>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="mb-3">
            <label for="name" class="form-label small fw-medium">Full Name</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="John Doe" required autofocus>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</div>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label small fw-medium">Email Address</label>
            <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="name@example.com" required>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email Error</div>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label small fw-medium">Password</label>
            <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="At least 6 characters" required>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password Error</div>
        </div>
        <div class="mb-3">
            <label for="confirmPassword" class="form-label small fw-medium">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Repeat password" required>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Confirm Password Error</div>
        </div>
        <button type="submit" class="btn btn-green w-100 mb-3">Sign Up</button>
    </form>

    <div class="text-center">
        <p class="small text-muted mb-0">Already have an account? <a th:href="@{/login}" class="text-green fw-medium">Sign In here</a></p>
    </div>
</div>

<!-- Bootstrap 5 Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
