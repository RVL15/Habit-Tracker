<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Habit Tracker</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .register-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
        }
        .register-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        }
        .btn-green {
            background-color: #2ecc71;
            border-color: #2ecc71;
            color: white;
            font-weight: 500;
            border-radius: 8px;
            padding: 0.6rem;
            transition: all 0.2s;
        }
        .btn-green:hover {
            background-color: #27ae60;
            border-color: #27ae60;
            color: white;
        }
        .form-control {
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ced4da;
        }
        .form-control:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 0.25rem rgba(46, 204, 113, 0.25);
        }
        .text-green {
            color: #2ecc71;
        }
        .text-green:hover {
            color: #27ae60;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="register-card my-4">
    <div class="text-center mb-4">
        <h2 class="fw-bold mb-1">Create Account</h2>
        <p class="text-muted small">Start building healthier routines today</p>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="mb-3">
            <label for="name" class="form-label small fw-medium">Full Name</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="John Doe" required autofocus>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</div>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label small fw-medium">Email Address</label>
            <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="name@example.com" required>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email Error</div>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label small fw-medium">Password</label>
            <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="At least 6 characters" required>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password Error</div>
        </div>
        <div class="mb-3">
            <label for="confirmPassword" class="form-label small fw-medium">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Repeat password" required>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Confirm Password Error</div>
        </div>
        <button type="submit" class="btn btn-green w-100 mb-3">Sign Up</button>
    </form>

    <div class="text-center">
        <p class="small text-muted mb-0">Already have an account? <a th:href="@{/login}" class="text-green fw-medium">Sign In here</a></p>
    </div>
</div>

<!-- Bootstrap 5 Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
