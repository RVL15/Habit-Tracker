<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Habit Tracker</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --primary-light: rgba(16, 185, 129, 0.15);
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --border: #334155;
            }
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }
        .login-card {
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            background: var(--card-bg);
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
        }
        .login-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .btn-green {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            font-weight: 600;
            border-radius: 10px;
            padding: 0.7rem;
            transition: all 0.2s ease;
        }
        .btn-green:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        .form-control {
            background-color: var(--card-bg);
            color: var(--text-main);
            border-radius: 10px;
            padding: 0.7rem 0.9rem;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }
        .form-control::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }
        .form-control:focus {
            background-color: var(--card-bg);
            color: var(--text-main);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }
        .text-green {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .text-green:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
        .text-muted {
            color: var(--text-muted) !important;
        }
        .alert {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold mb-1">Welcome Back</h2>
        <p class="text-muted small">Log in to track your habits and goals</p>
    </div>

    <!-- Feedback messages -->
    <div th:if="${param.error}" class="alert alert-danger py-2 px-3 small rounded-3" role="alert">
        Invalid email or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2 px-3 small rounded-3" role="alert">
        You have been logged out successfully.
    </div>
    <div th:if="${param.registered}" class="alert alert-success py-2 px-3 small rounded-3" role="alert">
        Registration successful! Please log in.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="email" class="form-label small fw-medium">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required autofocus>
        </div>
        <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center">
                <label for="password" class="form-label small fw-medium mb-0">Password</label>
            </div>
            <input type="password" class="form-control mt-2" id="password" name="password" placeholder="••••••••" required>
        </div>
        <div class="mb-3 form-check d-flex align-items-center">
            <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
            <label class="form-check-label small text-muted ms-2" for="remember-me">Remember me on this device</label>
        </div>
        <button type="submit" class="btn btn-green w-100 mb-3">Sign In</button>
    </form>

    <div class="text-center">
        <p class="small text-muted mb-0">Don't have an account? <a th:href="@{/register}" class="text-green fw-medium">Register here</a></p>
    </div>
</div>

<!-- Bootstrap 5 Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
