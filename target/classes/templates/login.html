<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Habit Tracker</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
        }
        .login-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        }
        .btn-green {
            background-color: #2ecc71;
            border-color: #2ecc71;
            color: white;
            font-weight: 500;
            border-radius: 8px;
            padding: 0.6rem;
            transition: all 0.2s;
        }
        .btn-green:hover {
            background-color: #27ae60;
            border-color: #27ae60;
            color: white;
        }
        .form-control {
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ced4da;
        }
        .form-control:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 0.25rem rgba(46, 204, 113, 0.25);
        }
        .text-green {
            color: #2ecc71;
        }
        .text-green:hover {
            color: #27ae60;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold mb-1">Welcome Back</h2>
        <p class="text-muted small">Log in to track your habits and goals</p>
    </div>

    <!-- Feedback messages -->
    <div th:if="${param.error}" class="alert alert-danger py-2 px-3 small rounded-3" role="alert">
        Invalid email or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2 px-3 small rounded-3" role="alert">
        You have been logged out successfully.
    </div>
    <div th:if="${param.registered}" class="alert alert-success py-2 px-3 small rounded-3" role="alert">
        Registration successful! Please log in.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="email" class="form-label small fw-medium">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required autofocus>
        </div>
        <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center">
                <label for="password" class="form-label small fw-medium mb-0">Password</label>
            </div>
            <input type="password" class="form-control mt-2" id="password" name="password" placeholder="••••••••" required>
        </div>
        <div class="mb-3 form-check d-flex align-items-center">
            <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
            <label class="form-check-label small text-muted ms-2" for="remember-me">Remember me on this device</label>
        </div>
        <button type="submit" class="btn btn-green w-100 mb-3">Sign In</button>
    </form>

    <div class="text-center">
        <p class="small text-muted mb-0">Don't have an account? <a th:href="@{/register}" class="text-green fw-medium">Register here</a></p>
    </div>
</div>

<!-- Bootstrap 5 Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
