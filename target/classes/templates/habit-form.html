<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${habit.id == null ? 'Add Habit' : 'Edit Habit'} + ' - Habit Tracker'">Habit Form</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8faf9;
            color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 0;
        }
        .form-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
        }
        .btn-green {
            background-color: #2ecc71;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            transition: all 0.2s;
            padding: 0.6rem 1.2rem;
        }
        .btn-green:hover {
            background-color: #27ae60;
            color: white;
        }
        .form-control {
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ced4da;
        }
        .form-control:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 0.25rem rgba(46, 204, 113, 0.25);
        }
        .form-control-color {
            height: 42px;
            padding: 0.3rem;
            width: 80px;
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="mb-4">
        <a th:href="@{/habits}" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left"></i> Back to Habits</a>
        <h3 class="fw-bold mt-2 mb-1" th:text="${habit.id == null ? 'Add New Habit' : 'Edit Habit'}">Add Habit</h3>
        <p class="text-muted small" th:text="${habit.id == null ? 'Set up a new recurring daily goal.' : 'Modify your habit preferences.'}">Habit Form Details</p>
    </div>

    <form th:action="${habit.id == null ? '/habit/add' : '/habit/edit/' + habit.id}" th:object="${habit}" method="post">
        
        <!-- Habit Name -->
        <div class="mb-3">
            <label for="habitName" class="form-label small fw-medium">Habit Name</label>
            <input type="text" class="form-control" id="habitName" th:field="*{habitName}" placeholder="e.g. Wake up at 5:00 AM" required autofocus>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('habitName')}" th:errors="*{habitName}">Habit Name Error</div>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label for="description" class="form-label small fw-medium">Description (Optional)</label>
            <textarea class="form-control" id="description" th:field="*{description}" rows="3" placeholder="Briefly state your purpose or custom sub-goals..."></textarea>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description Error</div>
        </div>

        <!-- Display Order -->
        <div class="mb-3">
            <label for="displayOrder" class="form-label small fw-medium">Display Order</label>
            <input type="number" class="form-control" id="displayOrder" th:field="*{displayOrder}" placeholder="e.g. 1, 2, 3 (Optional)">
            <small class="text-muted d-block mt-1">Lower order numbers will display first in the grid.</small>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('displayOrder')}" th:errors="*{displayOrder}">Order Error</div>
        </div>

        <!-- Category -->
        <div class="mb-3">
            <label for="category" class="form-label small fw-medium">Category</label>
            <select class="form-select form-control" id="category" th:field="*{category}">
                <option value="Health">Health</option>
                <option value="Fitness">Fitness</option>
                <option value="Study">Study</option>
                <option value="Finance">Finance</option>
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
                <option value="Meditation">Meditation</option>
                <option value="Reading">Reading</option>
                <option value="Custom">Custom</option>
            </select>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('category')}" th:errors="*{category}">Category Error</div>
        </div>

        <!-- Color Accent -->
        <div class="mb-4">
            <label for="color" class="form-label small fw-medium">Color Accent</label>
            <div class="d-flex align-items-center gap-3">
                <input type="color" class="form-control form-control-color" id="color" th:field="*{color}" title="Choose color accent">
                <span class="text-muted small">Choose a distinct color for your dashboard grid.</span>
            </div>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('color')}" th:errors="*{color}">Color Error</div>
        </div>

        <!-- Buttons -->
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-green flex-grow-1" th:text="${habit.id == null ? 'Create Habit' : 'Save Changes'}">Create Habit</button>
            <a th:href="@{/habits}" class="btn btn-light border flex-grow-1 py-2">Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
